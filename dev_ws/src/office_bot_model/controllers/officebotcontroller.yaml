controller_manager:
  ros__parameters:
    update_rate: 500 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_group_position_controller:
      type: position_controllers/JointGroupPositionController

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

joint_group_position_controller:
  ros__parameters:
    joints:
      - top
      - body_drawer1
      - body_drawer2
      - body_drawer3
      - body_drawer4
      - body_drawer5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    max_velocity: 1.0 # rad/s
    max_acceleration: 2.0 # rad/s^2
    gains:
      top: { p: 10.0, i: 10.0, d: 1.0 }
      body_drawer1: { p: 10.0, i: 10.0, d: 1.0 }
      body_drawer2: { p: 10.0, i: 10.0, d: 1.0 }
      body_drawer3: { p: 10.0, i: 10.0, d: 1.0 }
      body_drawer4: { p: 10.0, i: 10.0, d: 1.0 }
      body_drawer5: { p: 10.0, i: 10.0, d: 1.0 }

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 0.9
    front_left_wheel_command_joint_name: "body_wheel1"
    front_right_wheel_command_joint_name: "body_wheel2"
    rear_right_wheel_command_joint_name: "body_wheel3"
    rear_left_wheel_command_joint_name: "body_wheel4"

    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      wheels_radius: 0.5
      sum_of_robot_center_projection_on_X_Y_axis: 1.0

    base_frame_id: "base_link"
    odom_frame_id: "odom"
    enable_odom_tf: true
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
