controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 1000 # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_drive_controller:
      type: mecanum_drive_controller/MecanumDriveController

mecanum_drive_controller:
  ros__parameters:
    reference_timeout: 1.0 # max time between command messages before the vehicle should stop
    front_left_wheel_command_joint_name: "base_wheel_fl"
    front_right_wheel_command_joint_name: "base_wheel_fr"
    rear_right_wheel_command_joint_name: "base_wheel_rr"
    rear_left_wheel_command_joint_name: "base_wheel_rl"
    kinematics:
      base_frame_offset: { x: 0.0, y: 0.0, theta: 0.0 }
      wheels_radius: 0.025
      sum_of_robot_center_projection_on_X_Y_axis: 0.326
    use_stamped_vel: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    enable_odom_tf: true
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.001]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.001]
