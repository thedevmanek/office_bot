name: Publish runtime image

on:
  push:
    branches:
      - main
    paths:
      - "Containerfile"
      - "container/**"
      - ".github/workflows/publish-runtime-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openhri-office

jobs:
  publish:
    name: Build and publish runtime image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "tags<<EOF"
            printf '%s\n' "${IMAGE_NAME}:latest-preview"
            echo "EOF"
          } >>"${GITHUB_OUTPUT}"

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=openhri-runtime
          cache-to: type=gha,mode=max,scope=openhri-runtime
          push: true
          tags: ${{ steps.tags.outputs.tags }}
