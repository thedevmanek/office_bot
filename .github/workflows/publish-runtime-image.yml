name: Publish runtime image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Additional image tag to publish, for example 0.1.0-preview"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "Containerfile"
      - "compose.yaml"
      - "container/**"
      - ".github/workflows/publish-runtime-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/openhri-office

jobs:
  publish:
    name: Build and publish runtime image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          MANUAL_IMAGE_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          set -euo pipefail

          tags=()
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=("${IMAGE_NAME}:latest-preview")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("${IMAGE_NAME}:${version}")
          fi

          if [[ -n "${MANUAL_IMAGE_TAG}" ]]; then
            tags+=("${IMAGE_NAME}:${MANUAL_IMAGE_TAG}")
          fi

          if [[ "${#tags[@]}" -eq 0 ]]; then
            echo "No image tags resolved for this event." >&2
            exit 1
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >>"${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
